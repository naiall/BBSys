<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MedLab Scanner — Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=DM+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #131c2b; --sd: #0b1219; --sl: #1b2739; --t1: #d8eaf8; --t3: #7a9ab8;
            --cyan: #22d3ee; --red: #f87171;
            --nm-in: inset 6px 6px 12px var(--sd), inset -6px -6px 12px var(--sl);
            --nm-out: 8px 8px 16px var(--sd), -8px -8px 16px var(--sl);
        }
        [data-theme="light"] {
            --bg: #e2ecf4; --sd: #b8c8d8; --sl: #ffffff; --t1: #1a2e44; --t3: #7a9ab2;
            --cyan: #0891b2; --red: #dc2626;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body { background: var(--bg); color: var(--t1); min-height: 100vh; padding: 20px; transition: 0.3s; }

        /* Scanner Frame */
        .scanner-container {
            position: relative; width: 100%; max-width: 450px; margin: 0 auto;
            border-radius: 30px; overflow: hidden; box-shadow: var(--nm-out);
            aspect-ratio: 1/1; background: #000;
        }
        #reader { width: 100% !important; border: none !important; }
        #reader__scan_region { background: #000; }
        
        /* Laser Animation */
        .laser {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--cyan); box-shadow: 0 0 15px var(--cyan);
            z-index: 10; animation: scan 2s infinite linear; pointer-events: none;
        }
        @keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }

        /* UI Elements */
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 20px; font-weight: 700; color: var(--t1); letter-spacing: 1px; }
        .header p { font-size: 12px; color: var(--t3); text-transform: uppercase; margin-top: 5px; }

        .card {
            background: var(--bg); border-radius: 20px; padding: 20px;
            margin-top: 25px; box-shadow: var(--nm-out); display: none;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .sku-badge { font-family: 'DM Mono', monospace; background: var(--sd); padding: 5px 12px; border-radius: 8px; color: var(--cyan); font-size: 14px; }
        .inp {
            width: 100%; background: var(--bg); border: none; padding: 12px;
            border-radius: 12px; box-shadow: var(--nm-in); color: var(--t1);
            font-size: 18px; text-align: center; margin: 15px 0; outline: none;
        }
        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: var(--nm-out);
        }
        .btn-p { background: var(--bg); color: var(--cyan); }
        .btn-p:active { box-shadow: var(--nm-in); transform: scale(0.98); }
        
        #status-msg { text-align: center; font-size: 13px; color: var(--t3); margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MEDLAB SMART SCANNER</h1>
        <p>Betong Hospital Inventory System</p>
    </div>

    <div class="scanner-container">
        <div class="laser"></div>
        <div id="reader"></div>
    </div>
    <div id="status-msg">💡 เล็งบาร์โค้ดให้อยู่ในกรอบเพื่อเริ่มทำงาน</div>

    <div id="resultCard" class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span style="font-size:11px; font-weight:700; color:var(--t3); text-transform:uppercase;">Product Found</span>
            <span class="sku-badge" id="display-sku">SKU-XXXX</span>
        </div>
        <h2 id="display-name" style="font-size:18px; margin-bottom:5px;">กำลังโหลด...</h2>
        <p id="display-bal" style="font-size:13px; color:var(--t3); margin-bottom:20px;">คงเหลือ: —</p>

        <div style="margin-bottom:10px;">
            <label style="font-size:10px; font-weight:700; color:var(--cyan); text-transform:uppercase;">จำนวนที่ต้องการเบิก</label>
            <input type="number" id="input-qty" class="inp" value="1" min="1" inputmode="numeric">
        </div>

        <button class="btn btn-p" onclick="confirmIssue()">💾 ยืนยันการตัดคลัง</button>
        <button class="btn" style="margin-top:10px; box-shadow:none; color:var(--red); font-size:12px;" onclick="restartScanner()">✕ ยกเลิก</button>
    </div>

    <script>
        const GAS_API = "https://script.google.com/macros/s/AKfycbwDrjAoH6zKUfIZzUeesliyUgeYwvprP_sUFYCU0SjKKomXlxqRF1FJcv3oUhHgl1zmag/exec";
        let html5QrCode;

        // เริ่มต้นเปิดกล้องหลังอัตโนมัติ
        window.addEventListener('DOMContentLoaded', (event) => {
            startCamera();
        });

        function startCamera() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 20, qrbox: { width: 250, height: 150 } };
            
            // เปิดกล้องหลัง (facingMode: environment)
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                document.getElementById('status-msg').innerHTML = "❌ ไม่สามารถเข้าถึงกล้องได้: " + err;
            });
        }

        function onScanSuccess(decodedText) {
            vibrate();
            html5QrCode.pause(); // หยุดสแกนชั่วคราว
            document.querySelector('.laser').style.display = 'none';
            fetchProduct(decodedText);
        }

        function fetchProduct(sku) {
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('display-sku').textContent = sku;
            document.getElementById('status-msg').textContent = "🔍 กำลังดึงข้อมูลจากฐานข้อมูล...";

            fetch(GAS_API, {
                method: "POST",
                body: JSON.stringify({ action: "search", sku: sku })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('display-name').textContent = data.name;
                    document.getElementById('display-bal').textContent = "คงเหลือรวม: " + data.balance + " " + (data.unit || '');
                    document.getElementById('status-msg').textContent = "✅ พบข้อมูลแล้ว";
                } else {
                    alert("ไม่พบรหัสพัสดุนี้ในระบบ");
                    restartScanner();
                }
            })
            .catch(err => alert("Error API: " + err));
        }

        function confirmIssue() {
            const sku = document.getElementById('display-sku').textContent;
            const qty = document.getElementById('input-qty').value;

            if(qty <= 0) return alert("ระบุจำนวนให้ถูกต้อง");

            const payload = {
                action: "save",
                sku: sku,
                issue: qty,
                receive: 0,
                date: new Date().toISOString().split('T')[0],
                userName: "Mobile-Scanner",
                dept: "LAB",
                note: "ตัดคลังผ่านการสแกน"
            };

            fetch(GAS_API, { method: "POST", body: JSON.stringify(payload) })
            .then(() => {
                alert("ตัดคลังสำเร็จ!");
                restartScanner();
            });
        }

        function restartScanner() {
            document.getElementById('resultCard').style.display = 'none';
            document.querySelector('.laser').style.display = 'block';
            document.getElementById('status-msg').textContent = "💡 เล็งบาร์โค้ดให้อยู่ในกรอบ";
            html5QrCode.resume();
        }

        function vibrate() { if (navigator.vibrate) navigator.vibrate(100); }
    </script>
</body>
</html>
